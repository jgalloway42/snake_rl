training:
  total_timesteps: 5_000_000
  render_every_n_episodes: 24   # 0 or -1 = fully headless; 1 = every episode
  n_envs: 4
  save_path: "models/"
  model_name: "snake_ppo"

ppo:
  learning_rate: 0.0001  # lowered from 0.0003; slower updates give value function more time to fit
  n_steps: 2048          # steps collected per env per rollout; larger = lower variance
  batch_size: 64         # samples per gradient step
  n_epochs: 10           # gradient passes over each rollout buffer
  gamma: 0.99            # discount factor; high value preserves long-term survival incentive
  gae_lambda: 0.95       # bias-variance tradeoff for advantage estimation (SB3 default)
  clip_range: 0.2        # limits how much the policy can change per update (standard PPO)
  ent_coef: 0.10         # raised from 0.05; prevents entropy collapse before food is discovered

env:
  grid_w: 16
  grid_h: 16
  max_steps: 300

reward:
  food: 16.0        # scaled down 4× from 64; reduces value-function variance (MSE loss scales with food²)
  collision: -2.0   # scaled down 4× from -8; maintains 8:1 food:collision ratio; cheaper death = more early exploration
  toward: 0.01      # tiny shaping signal (~6% of food reward); food still dominates
  away: -0.02  # scaled proportionally to toward (2:1 ratio)

policy:
  features_dim: 64
  hidden_dims: [256, 128]

mlflow:
  experiment_name: "snake-rl"
  tracking_uri: "sqlite:///mlruns/mlflow.db"
