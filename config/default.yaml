training:
  total_timesteps: 5_000_000
  render_every_n_episodes: 24   # 0 or -1 = fully headless; 1 = every episode
  n_envs: 1                     # DQN uses a single env with replay buffer
  save_path: "models/"
  model_name: "snake_dqn"

dqn:
  learning_rate: 0.0001
  buffer_size: 100000           # replay buffer size; 100k transitions
  learning_starts: 10000        # random steps before first gradient update
  batch_size: 32
  gamma: 0.99                   # discount factor
  train_freq: 4                 # gradient step every 4 env steps
  gradient_steps: 1
  target_update_interval: 1000  # steps between hard target-network syncs
  exploration_fraction: 0.3     # fraction of total_timesteps for epsilon decay
  exploration_initial_eps: 1.0  # start fully random
  exploration_final_eps: 0.05   # floor epsilon

env:
  grid_w: 16
  grid_h: 16
  max_steps: 300

reward:
  food: 16.0        # scaled down 4× from 64; reduces value-function variance
  collision: -2.0   # 8:1 food:collision ratio; cheap death = more early exploration
  toward: 0.0       # no shaping; food is the only positive signal
  away: 0.0         # no shaping

policy:
  features_dim: 64
  hidden_dims: [256, 128]

mlflow:
  experiment_name: "snake-rl"
  tracking_uri: "sqlite:///mlruns/mlflow.db"
