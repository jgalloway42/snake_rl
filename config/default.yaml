training:
  total_timesteps: 5_000_000
  render_every_n_episodes: 24   # 0 or -1 = fully headless; 1 = every episode
  n_envs: 4
  save_path: "models/"
  model_name: "snake_ppo"

ppo:
  learning_rate: 0.0003  # standard starting point; can be decayed if reward plateaus
  n_steps: 2048          # steps collected per env per rollout; larger = lower variance
  batch_size: 64         # samples per gradient step
  n_epochs: 10           # gradient passes over each rollout buffer
  gamma: 0.99            # discount factor; high value preserves long-term survival incentive
  gae_lambda: 0.95       # bias-variance tradeoff for advantage estimation (SB3 default)
  clip_range: 0.2        # limits how much the policy can change per update (standard PPO)
  ent_coef: 0.02         # entropy bonus; higher value slows entropy collapse / keeps exploration

env:
  grid_w: 24
  grid_h: 24
  max_steps: 500

reward:
  food: 64.0        # reward for eating food
  collision: -16.0  # penalty for hitting a wall or the snake's own body
  toward: 0.1       # reward per step that moves closer to food (~0.16% of food reward)
  away: -0.05       # penalty per step that moves away from food (reduced from -0.5)

policy:
  features_dim: 64
  hidden_dims: [256, 128]

mlflow:
  experiment_name: "snake-rl"
  tracking_uri: "sqlite:///mlruns/mlflow.db"
